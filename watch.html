<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="images/watch.ico">
    <title>Stopwatch</title>
    <link rel="stylesheet" type="text/css" href="watch.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double+Ink:wght@100..900&
family=Saira+Stencil:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
  
    <h1>STOPWATCH</h1>

    <div id="container">
        <div id="display">
            00:00:00:00
    </div>
    
    <div id="controls">
            <button id="startbtn" onclick="start()">Start</button>
            <button id="stopbtn" onclick="stop()">Stop</button>
            <button id="resetbtn" onclick="reset()">Reset</button>

        </div>

    <div id="log">
        <h2>Time Log</h2>
        <ul id="logList"></ul>
    </div>

    </div>

 <script type="text/javascript" src="watch.js"></script>
</body>
</html>
